services:
  gateway:
    image: nginx:stable-alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - identity
      - account
      - payments
      - ledger
      - frontend
      - fraud
    restart: always

  # --- Certbot for SSL ---
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  # --- Message Broker (local, internal-only) ---
  # No host ports are published, so it is only reachable on the internal
  # arhan-network. A dedicated user 'arhan' is created via the env vars below;
  # unlike the built-in 'guest', a custom user has NO localhost-only
  # restriction, so worker containers can connect (no 403 ACCESS_REFUSED).
  rabbitmq:
    image: rabbitmq:3-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=arhan
      - RABBITMQ_DEFAULT_PASS=arhanbroker123
    networks:
      - arhan-network
    restart: always

  # --- 1. Identity Service (arhan_financial) ---
  identity:
    build: ./arhan_financial
    command: sh -c "python manage.py migrate --noinput || echo 'MIGRATE FAILED (continuing)'; python manage.py runserver 0.0.0.0:8001"
    volumes:
      - ./arhan_financial:/Identity_service
    ports:
      - "8001:8001"
    environment:
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    depends_on:
      - rabbitmq
    networks:
      - arhan-network

  identity_worker:
    build: ./arhan_financial
    command: celery -A arhan_financial worker -l info
    volumes:
      - ./arhan_financial:/Identity_service
    environment:
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    depends_on:
      - rabbitmq
      - identity
    networks:
      - arhan-network

  # --- 2. Account Service (account_services) ---
  account:
    build: ./account_services
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - ./account_services:/account_service
    ports:
      - "8002:8002"
    environment:
      - IDENTITY_SERVICE_URL=http://identity:8001
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    depends_on:
      - rabbitmq
    networks:
      - arhan-network

  account_worker:
    build: ./account_services
    command: celery -A account_services worker -Q account_service.internal,celery -l info
    volumes:
      - ./account_services:/account_service
    environment:
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    depends_on:
      - rabbitmq
      - account
    networks:
      - arhan-network

  # --- 3. Payments Service (payments) ---
  payments:
    build: ./payments
    command: python manage.py runserver 0.0.0.0:8004
    volumes:
      - ./payments:/payment
    ports:
      - "8004:8004"
    environment:
      - ACCOUNT_SERVICE_BASE_URL=http://account:8002
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    depends_on:
      - rabbitmq
    networks:
      - arhan-network

  payments_worker:
    build: ./payments
    command: celery -A payments worker -Q payment.internal,celery -l info
    volumes:
      - ./payments:/payment
    environment:
      - ACCOUNT_SERVICE_BASE_URL=http://account:8002
      - FRAUD_SERVICE_URL=http://fraud:8006
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    depends_on:
      - rabbitmq
      - payments
      - fraud
    networks:
      - arhan-network

  # --- 4. Ledger Service (ledger_service) ---
  ledger:
    build: ./ledger_service
    command: python manage.py runserver 0.0.0.0:8003
    volumes:
      - ./ledger_service:/ledger
    ports:
      - "8003:8003"
    environment:
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    depends_on:
      - rabbitmq
    networks:
      - arhan-network

  ledger_worker:
    build: ./ledger_service
    command: celery -A ledger_service worker -Q ledger.internal,celery -l info
    volumes:
      - ./ledger_service:/ledger
    environment:
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    depends_on:
      - rabbitmq
      - ledger
    networks:
      - arhan-network

  # --- 5. Frontend Service (frontend_service) ---
  frontend:
    build: ./frontend_service
    command: sh -c "python manage.py migrate --noinput || echo 'MIGRATE FAILED (continuing)'; python manage.py collectstatic --noinput || echo 'COLLECTSTATIC FAILED (continuing)'; python manage.py runserver 0.0.0.0:8005"
    volumes:
      - ./frontend_service:/webportal
    ports:
      - "8005:8005"
    environment:
      - CELERY_BROKER_URL=amqp://arhan:arhanbroker123@rabbitmq:5672//
    networks:
      - arhan-network

  # --- 6. Fraud Service (fraud_service) ---
  fraud:
    build: ./fraud_service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8006 --reload
    volumes:
      - ./fraud_service:/app
    ports:
      - "8006:8006"
    networks:
      - arhan-network


networks:
  arhan-network:
    driver: bridge
